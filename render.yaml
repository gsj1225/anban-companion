# Render Blueprint - 安伴老人陪伴AI对话服务
# 部署方式：在 Render Dashboard 选择 "Blueprint"，粘贴此文件内容
services:
  - type: web
    name: anban-companion
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: 10000
      - key: DEFAULT_CITY
        value: 北京
